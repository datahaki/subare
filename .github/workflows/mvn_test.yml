name: mvn test with JDK
on:
  push:
    paths:
      - '**'
jobs:
  os_matrix:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout main repo
        uses: actions/checkout@v5

      - name: set up JDK 26
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'zulu'
          cache: 'maven'

      - name: checkout tensor
        uses: actions/checkout@v5
        with:
          repository: datahaki/tensor
          path: tensor
      - name: build and install tensor
        run: mvn -B -ntp install -DskipTests
        working-directory: ./tensor

      - name: mvn test
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum mvn -B -ntp test
          else
            mvn -B -ntp test
          fi
